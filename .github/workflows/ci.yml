name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────
  # BACKEND
  # ──────────────────────────────────────────────────────────
  backend-lint:
    name: "Backend · Lint"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff>=0.8.0

      - name: Ruff check
        run: ruff check app

      - name: Ruff format check
        run: ruff format --check app

  backend-test:
    name: "Backend · Test"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ap_operations_test
          POSTGRES_USER: ap_user
          POSTGRES_PASSWORD: ap_password_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ap_user -d ap_operations_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://ap_user:ap_password_dev@localhost:5432/ap_operations_test
      REDIS_URL: redis://localhost:6379/1
      SECRET_KEY: ci-test-secret-key
      S3_ENDPOINT: http://localhost:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin123
      S3_BUCKET: ap-invoices-test
      LLM_API_KEY: test-key
      LLM_MODEL: claude-haiku-4-5-20251001
      CORS_ORIGINS: '["http://localhost:3000"]'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run pytest
        run: pytest -v --tb=short

  backend-migrations:
    name: "Backend · Migrations"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ap_operations
          POSTGRES_USER: ap_user
          POSTGRES_PASSWORD: ap_password_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ap_user -d ap_operations"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://ap_user:ap_password_dev@localhost:5432/ap_operations
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ci-test-secret-key
      S3_ENDPOINT: http://localhost:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin123
      S3_BUCKET: ap-invoices
      LLM_API_KEY: test-key
      LLM_MODEL: claude-haiku-4-5-20251001
      CORS_ORIGINS: '["http://localhost:3000"]'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run migrations
        run: alembic upgrade head

      - name: Check for un-generated migrations
        run: |
          alembic check 2>&1 || {
            echo "::error::Model changes not captured in migrations. Run 'alembic revision --autogenerate' locally."
            exit 1
          }

  # ──────────────────────────────────────────────────────────
  # FRONTEND
  # ──────────────────────────────────────────────────────────
  frontend-checks:
    name: "Frontend · Lint & Build"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit
        continue-on-error: true # Existing codebase has ignoreBuildErrors: true

      - name: ESLint
        run: npm run lint

      - name: Next.js build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  # ──────────────────────────────────────────────────────────
  # E2E TESTS
  # ──────────────────────────────────────────────────────────
  e2e:
    name: "E2E · Playwright"
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-checks]
    steps:
      - uses: actions/checkout@v4

      - name: Start full stack
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d --build

      - name: Wait for services
        run: |
          echo "⏳ Waiting for backend..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "✅ Backend healthy"
              break
            fi
            [ "$i" -eq 60 ] && { echo "::error::Backend timeout"; docker compose logs backend; exit 1; }
            sleep 5
          done
          echo "⏳ Waiting for frontend..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "✅ Frontend ready"
              break
            fi
            [ "$i" -eq 60 ] && { echo "::error::Frontend timeout"; docker compose logs frontend; exit 1; }
            sleep 5
          done

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: frontend
        run: npx playwright test
        env:
          CI: "true"

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-test-results
          path: frontend/test-results/
          retention-days: 7

      - name: Docker logs on failure
        if: failure()
        run: docker compose logs --tail=200
